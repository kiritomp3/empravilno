services:
  api:
    image: feature-base-clips-api
    container_name: feature-base-clips-api
    restart: unless-stopped
    env_file:
      - .env.feature-base-clips
    environment:
      PORT: "8000"
      RABBIT_URL: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672/
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-root}:${MONGO_INITDB_ROOT_PASSWORD:-example}@mongo:27017/${MONGO_DB:-video2shorts_feature_base_clips}?authSource=admin
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "18091:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/openapi.json', timeout=5)\""]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 40s

  worker:
    image: feature-base-clips-worker
    container_name: feature-base-clips-worker
    restart: unless-stopped
    entrypoint: ["/opt/nvidia/nvidia_entrypoint.sh"]
    command: ["python", "worker.py"]
    env_file:
      - .env.feature-base-clips
    environment:
      PYTHONUNBUFFERED: "1"
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-all}
      RABBIT_URL: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672/
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-root}:${MONGO_INITDB_ROOT_PASSWORD:-example}@mongo:27017/${MONGO_DB:-video2shorts_feature_base_clips}?authSource=admin
      MUSIC_DIR: /app/music
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - type: bind
        source: ${FEATURE_BASE_CLIPS_MUSIC_DIR:-./feature-base-clips/music}
        target: /app/music
        read_only: true
      - type: bind
        source: ${FEATURE_BASE_CLIPS_SECRETS_DIR:-./feature-base-clips/secrets}
        target: /app/secrets

  rabbitmq:
    image: rabbitmq:3-management
    container_name: feature-base-clips-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: -rabbit consumer_timeout 7200000
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 8
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  mongo:
    image: mongo:6
    container_name: feature-base-clips-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-example}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet -u \"$${MONGO_INITDB_ROOT_USERNAME}\" -p \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
    driver: local
  rabbitmq-data:
    driver: local
